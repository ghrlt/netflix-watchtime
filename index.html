<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Netflix Watchtime</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!-- Loading / status screen -->
        <div id="loader">
            <img class="brand" src="medias/netflix.png" alt="Netflix">
            <div class="netflix-loader"></div>
            <p id="logs" class="text" data-text-key="loading"></p>
            <div id="progress-wrap"><div id="progress-bar"></div></div>
        </div>

        <!-- Error / not-logged-in screen -->
        <div id="error" style="display:none;">
            <img class="brand" src="medias/netflix.png" alt="Netflix">
            <h2 id="error-title"></h2>
            <p id="error-msg"></p>
            <button id="retry-btn" class="btn" data-text-key="retry"></button>
        </div>

        <!-- Dashboard -->
        <div id="content" style="display:none;">
            <header class="topbar">
                <img class="brand" src="medias/netflix.png" alt="Netflix">
                <span class="wordmark text" data-text-key="watchtime"></span>
                <span id="profile-name" class="profile-pill"></span>
            </header>

            <section class="hero">
                <p class="hero-label text" data-text-key="totalWatchtime"></p>
                <div class="hero-number"><span id="total-stat">—</span></div>
                <p id="hero-sub" class="hero-sub"></p>
                <span class="estimate-tag text" data-text-key="accuracyTag"></span>
            </section>

            <section id="cards" class="cards"></section>

            <section class="charts">
                <div class="chart-card"><canvas id="contentproportion"></canvas></div>
                <div class="chart-card"><canvas id="periodproportion"></canvas></div>
                <div class="chart-card wide"><canvas id="timeline"></canvas></div>
                <div class="chart-card"><canvas id="hourofday"></canvas></div>
                <div class="chart-card"><canvas id="dayofweek"></canvas></div>
                <div class="chart-card">
                    <h3 class="chart-title text" data-text-key="topSeries"></h3>
                    <ol id="top-series" class="top-list"></ol>
                </div>
            </section>

            <section id="leaderboard" class="leaderboard">
                <h3 class="lb-title text" data-text-key="lbTitle"></h3>
                <p class="lb-sub text" data-text-key="lbSubtitle"></p>
                <div id="lb-form" class="lb-form">
                    <input type="text" id="lb-name" maxlength="24">
                    <button id="lb-join-btn" class="btn"></button>
                </div>
                <p id="lb-result" class="lb-result" style="display:none;"></p>
                <a id="lb-viewall" class="lb-link" href="https://netflixwatchtime.zlef.fr" target="_blank" rel="noopener"></a>
            </section>

            <footer class="footer">
                <a id="twitter-share-btn" class="btn share" target="_blank">
                    <span class="text" data-text-key="shareResults"></span>
                </a>
                <p class="credit">
                    Netflix Watchtime · <span class="text" data-text-key="madeBy"></span>
                    <a href="https://github.com/ghrlt/netflix-watchtime" target="_blank">ghrlt</a>
                </p>
            </footer>
        </div>
    </body>

    <script src="chart.js"></script>
    <script src="scripts.js"></script>
</html>
